<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Elementals — Architecture Diagram</title>
  <style>
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f1efe8;
      --color-background-tertiary: #e8e6de;
      --color-background-info: #e6f1fb;
      --color-text-primary: #1a1a18;
      --color-text-secondary: #5f5e5a;
      --color-text-tertiary: #888780;
      --color-text-info: #185fa5;
      --color-border-tertiary: rgba(0,0,0,0.12);
      --color-border-secondary: rgba(0,0,0,0.22);
      --color-border-info: #378add;
      --font-sans: system-ui, -apple-system, sans-serif;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;

      /* SVG color ramp vars (light mode) */
      --p: #7f77dd; --s: #1d9e75; --t: #888780;
      --bg2: #f1efe8; --b: rgba(0,0,0,0.12);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-background-primary: #1e1e1c;
        --color-background-secondary: #2c2c2a;
        --color-background-tertiary: #242422;
        --color-background-info: #0c2a4a;
        --color-text-primary: #e8e6de;
        --color-text-secondary: #b4b2a9;
        --color-text-tertiary: #888780;
        --color-text-info: #85b7eb;
        --color-border-tertiary: rgba(255,255,255,0.1);
        --color-border-secondary: rgba(255,255,255,0.2);
        --color-border-info: #378add;
        --bg2: #2c2c2a; --t: #b4b2a9; --b: rgba(255,255,255,0.1);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--color-background-tertiary);
      color: var(--color-text-primary);
      padding: 24px 16px 48px;
      min-height: 100vh;
    }

    header {
      max-width: 760px;
      margin: 0 auto 20px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 500;
      color: var(--color-text-primary);
      margin-bottom: 4px;
    }

    header p {
      font-size: 13px;
      color: var(--color-text-secondary);
    }

    .card {
      background: var(--color-background-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-lg);
      padding: 16px;
      max-width: 760px;
      margin: 0 auto;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .tab-btn {
      background: var(--color-background-secondary);
      color: var(--color-text-secondary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 13px;
      font-family: var(--font-sans);
      cursor: pointer;
      transition: all 0.12s;
    }

    .tab-btn:hover {
      background: var(--color-background-tertiary);
      color: var(--color-text-primary);
    }

    .tab-btn.active {
      background: var(--color-background-info);
      color: var(--color-text-info);
      border-color: var(--color-border-info);
      font-weight: 500;
    }

    svg { display: block; width: 100%; }

    /* SVG pre-built classes */
    .t  { font-family: var(--font-sans); font-size: 14px; font-weight: 400; fill: var(--color-text-primary); }
    .ts { font-family: var(--font-sans); font-size: 12px; font-weight: 400; fill: var(--color-text-secondary); }
    .th { font-family: var(--font-sans); font-size: 14px; font-weight: 500; fill: var(--color-text-primary); }

    .box { fill: var(--bg2); stroke: var(--b); }
    .arr { fill: none; stroke: var(--t); stroke-width: 1.5; }
    .leader { fill: none; stroke: var(--t); stroke-width: 0.5; stroke-dasharray: 4 3; }

    .node { cursor: pointer; }
    .node:hover { opacity: 0.82; }

    /* Color ramps */
    .c-purple > rect, .c-purple > circle, .c-purple > ellipse { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple > text, .c-purple .th { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-teal > rect, .c-teal > circle, .c-teal > ellipse { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal > text, .c-teal .th { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }

    .c-coral > rect, .c-coral > circle, .c-coral > ellipse { fill: #FAECE7; stroke: #993C1D; }
    .c-coral > text, .c-coral .th { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }

    .c-blue > rect, .c-blue > circle, .c-blue > ellipse { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue > text, .c-blue .th { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }

    .c-gray > rect, .c-gray > circle, .c-gray > ellipse { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray > text, .c-gray .th { fill: #444441; }
    .c-gray .ts { fill: #5F5E5A; }

    .c-amber > rect, .c-amber > circle, .c-amber > ellipse { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber > text, .c-amber .th { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }

    .c-green > rect, .c-green > circle, .c-green > ellipse { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green > text, .c-green .th { fill: #27500A; }
    .c-green .ts { fill: #3B6D11; }

    @media (prefers-color-scheme: dark) {
      .c-purple > rect, .c-purple > circle, .c-purple > ellipse { fill: #3C3489; stroke: #AFA9EC; }
      .c-purple > text, .c-purple .th { fill: #CECBF6; }
      .c-purple .ts { fill: #AFA9EC; }

      .c-teal > rect, .c-teal > circle, .c-teal > ellipse { fill: #085041; stroke: #5DCAA5; }
      .c-teal > text, .c-teal .th { fill: #9FE1CB; }
      .c-teal .ts { fill: #5DCAA5; }

      .c-coral > rect, .c-coral > circle, .c-coral > ellipse { fill: #712B13; stroke: #F0997B; }
      .c-coral > text, .c-coral .th { fill: #F5C4B3; }
      .c-coral .ts { fill: #F0997B; }

      .c-blue > rect, .c-blue > circle, .c-blue > ellipse { fill: #0C447C; stroke: #85B7EB; }
      .c-blue > text, .c-blue .th { fill: #B5D4F4; }
      .c-blue .ts { fill: #85B7EB; }

      .c-gray > rect, .c-gray > circle, .c-gray > ellipse { fill: #444441; stroke: #B4B2A9; }
      .c-gray > text, .c-gray .th { fill: #D3D1C7; }
      .c-gray .ts { fill: #B4B2A9; }

      .c-amber > rect, .c-amber > circle, .c-amber > ellipse { fill: #633806; stroke: #EF9F27; }
      .c-amber > text, .c-amber .th { fill: #FAC775; }
      .c-amber .ts { fill: #EF9F27; }

      .c-green > rect, .c-green > circle, .c-green > ellipse { fill: #27500A; stroke: #97C459; }
      .c-green > text, .c-green .th { fill: #C0DD97; }
      .c-green .ts { fill: #97C459; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Elementals — Architecture Diagram</h1>
    <p>Classes, signals, and scene structure. Click any node to learn more.</p>
  </header>

  <div class="card">
    <div class="tabs">

      <button class="tab-btn" onclick="showTab('ranch',this)">Ranch system</button>

        </g>

        <line x1="340" y1="108" x2="340" y2="180" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr3)"/>

  <script>
    function showTab(id, btn) {
      ['overview','ranch','arena'].forEach(t => {
        document.getElementById('tab-'+t).style.display = t===id ? 'block' : 'none';
      });
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  </script>
